<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>HW 8.1 - Float Layout</title>
</head>

<body>
    <h1 class="title">FLOAT LAYOUT</h1>

    <div class="section">
        <div class="box box--left"></div>
        <div class="box box--right"></div>
    </div>
    <div class="section">
        <div class="box box--left"></div>
        <div class="box box--right"></div>
        <div class="box box--right"></div>
        <div class="box box--right"></div>

    </div>
    <div class="section">
        <div class="box box--left"></div>
        <div class="box box--left"></div>
        <div class="box box--right"></div>
        <div class="box box--right"></div>
    </div>
    <div class="section">
        <div class="inset-box box--right">
            <div class="box box--big box--left"></div>
            <div class="box box--right"></div>
            <div class="box box--right"></div>
        </div>
    </div>
    <div class="section">
        <div class="inset-box box--center">
            <div class="box box--big box--left"></div>
            <div class="box box--right"></div>
            <div class="box box--right"></div>
        </div>
    </div>
</body>

</html>
